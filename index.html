<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flag Quiz Generator</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#00ff00;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* VIDEO FRAME */

.frame{
width:405px;
height:720px;
background:#00ff00;
display:flex;
flex-direction:column;
align-items:center;
padding:15px;
box-sizing:border-box;
position:relative;
}

/* COUNTER */

.counter{
font-size:56px;
font-weight:bold;
color:#2e7d32;
text-shadow:0 3px 0 white;
margin-bottom:10px;
}

/* TIMER */

.timer{
position:absolute;
top:15px;
right:15px;
width:60px;
height:60px;
border-radius:50%;
border:5px solid white;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
font-weight:bold;
color:white;
background:rgba(0,0,0,0.4);
}

/* QUESTION */

.question{
background:white;
padding:12px 25px;
border-radius:30px;
font-size:20px;
font-weight:bold;
color:#2e7d32;
margin-bottom:15px;
}

/* FLAG */

.flagbox{
width:320px;
height:190px;
background:white;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 5px 10px rgba(0,0,0,0.3);
margin-bottom:15px;
}

.flagbox img{
width:100%;
height:100%;
object-fit:contain;
}

/* ANSWERS */

.answers{
width:100%;
display:flex;
flex-direction:column;
gap:8px;
}

.answer{
font-size:28px;
font-weight:bold;
color:#ffd54f;
text-shadow:2px 2px 0 #000;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.correct{
color:#2ecc71;
}

/* CONTROLS */

.controls{
position:fixed;
left:10px;
top:10px;
background:#111;
padding:15px;
border-radius:10px;
color:white;
font-size:14px;
width:200px;
}

.controls button{
margin-top:5px;
width:100%;
}

</style>
</head>

<body>

<div class="frame">

<div class="timer" id="timer">5</div>

<div contenteditable="true" class="counter">
1 / 30
</div>

<div contenteditable="true" class="question">
WHICH COUNTRY FLAG IS THAT?
</div>

<div class="flagbox">
<img id="flag">
</div>

<div class="answers">
<div class="answer" id="a"></div>
<div class="answer" id="b"></div>
<div class="answer" id="c"></div>
</div>

</div>

<div class="controls">

<button onclick="spin()">Spin</button>
<button onclick="reveal()">Reveal</button>

Timer Seconds
<input id="timerSeconds" value="5">

<br><br>

Background

<button onclick="greenscreen()">Green</button>
<button onclick="bgimg()">Image</button>

</div>

<script>

/* FLAG DATA */

let countries=[
{name:"Canada",flag:"https://flagcdn.com/w320/ca.png"},
{name:"United Kingdom",flag:"https://flagcdn.com/w320/gb.png"},
{name:"Germany",flag:"https://flagcdn.com/w320/de.png"},
{name:"France",flag:"https://flagcdn.com/w320/fr.png"},
{name:"Japan",flag:"https://flagcdn.com/w320/jp.png"},
{name:"Brazil",flag:"https://flagcdn.com/w320/br.png"},
{name:"Italy",flag:"https://flagcdn.com/w320/it.png"},
{name:"Spain",flag:"https://flagcdn.com/w320/es.png"},
{name:"Mexico",flag:"https://flagcdn.com/w320/mx.png"},
{name:"Australia",flag:"https://flagcdn.com/w320/au.png"},
{name:"India",flag:"https://flagcdn.com/w320/in.png"},
{name:"China",flag:"https://flagcdn.com/w320/cn.png"},
{name:"South Korea",flag:"https://flagcdn.com/w320/kr.png"},
{name:"Argentina",flag:"https://flagcdn.com/w320/ar.png"},
{name:"Netherlands",flag:"https://flagcdn.com/w320/nl.png"},
{name:"Sweden",flag:"https://flagcdn.com/w320/se.png"},
{name:"Norway",flag:"https://flagcdn.com/w320/no.png"},
{name:"Denmark",flag:"https://flagcdn.com/w320/dk.png"},
{name:"Poland",flag:"https://flagcdn.com/w320/pl.png"},
{name:"Portugal",flag:"https://flagcdn.com/w320/pt.png"}
]

let current

function spin(){

document.querySelectorAll(".answer").forEach(a=>{
a.classList.remove("correct")
})

startTimer()

let spins=0

let interval=setInterval(()=>{

let c=countries[Math.floor(Math.random()*countries.length)]

document.getElementById("flag").src=c.flag

spins++

if(spins>25){

clearInterval(interval)
current=c
setAnswers(c)

}

},80)

}

function setAnswers(correct){

let options=[correct]

while(options.length<3){

let r=countries[Math.floor(Math.random()*countries.length)]

if(!options.includes(r)) options.push(r)

}

options.sort(()=>Math.random()-0.5)

document.getElementById("a").innerText="A) "+options[0].name
document.getElementById("b").innerText="B) "+options[1].name
document.getElementById("c").innerText="C) "+options[2].name

window.correct=options.indexOf(correct)

}

function reveal(){

document.querySelectorAll(".answer")[correct].classList.add("correct")

}

function startTimer(){

let time=parseInt(document.getElementById("timerSeconds").value)

let timer=document.getElementById("timer")

timer.innerText=time

let t=setInterval(()=>{

time--
timer.innerText=time

if(time<=0){
clearInterval(t)
}

},1000)

}

function greenscreen(){

document.body.style.background="#00ff00"

}

function bgimg(){

let url=prompt("Image URL")

document.body.style.background=`url(${url}) center/cover`

}

spin()

</script>

</body>
</html>
