<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flag Quiz Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#00ff00;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* FRAME */

.frame{
width:405px;
height:720px;
display:flex;
flex-direction:column;
align-items:center;
padding:15px;
}

/* COUNTER */

.counter{
font-size:60px;
font-weight:bold;
color:#2e7d32;
-webkit-text-stroke:3px white;
}

/* TIMER */

.timer{
position:absolute;
top:20px;
right:20px;
width:70px;
height:70px;
border-radius:50%;
border:5px solid white;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:24px;
}

/* QUESTION */

.question-box{
background:white;
padding:12px 25px;
border-radius:30px;
margin:15px 0;
}

.question{
font-size:20px;
font-weight:bold;
}

/* FLAG */

.flagbox{
width:320px;
height:190px;
background:white;
border-radius:15px;
display:flex;
justify-content:center;
align-items:center;
margin-bottom:15px;
}

.flagbox img{
width:100%;
height:100%;
object-fit:contain;
}

/* ANSWERS */

.answers{
width:100%;
}

.answer{
font-size:28px;
font-weight:bold;
color:#ffd54f;
text-shadow:2px 2px black;
}

.correct{
color:#2ecc71;
}

/* CONTROLS */

.controls{
position:fixed;
left:10px;
top:10px;
background:#111;
padding:15px;
border-radius:10px;
color:white;
width:250px;
}

.controls input, .controls select{
width:100%;
margin-bottom:8px;
}

.controls button{
width:100%;
margin-bottom:5px;
padding:8px;
}
</style>
</head>

<body>

<div class="controls">
<b>Controls</b>

<input id="target" placeholder="Type country (e.g. France)">

<button onclick="spin()">Spin</button>
<button onclick="reveal()">Reveal</button>

<button onclick="toggleAnswers()">Toggle Answers</button>
<button onclick="toggleCounter()">Toggle Counter</button>
<button onclick="toggleTimer()">Toggle Timer</button>
<button onclick="toggleQuestion()">Toggle Question</button>

<select onchange="setLayout(this.value)">
<option value="9:16">9:16</option>
<option value="16:9">16:9</option>
</select>

</div>

<div class="frame">

<div class="counter" id="counter">1 / 30</div>

<div class="timer" id="timer">5</div>

<div class="question-box" id="qbox">
<div class="question" id="question">WHICH COUNTRY FLAG IS THAT?</div>
</div>

<div class="flagbox">
<img id="flag">
</div>

<div class="answers" id="answers">
<div class="answer" id="a"></div>
<div class="answer" id="b"></div>
<div class="answer" id="c"></div>
</div>

</div>

<script>

// STATIC COUNTRIES (WORKING — NO API)
const countries = [
{n:"France",c:"fr"},
{n:"Germany",c:"de"},
{n:"Spain",c:"es"},
{n:"Italy",c:"it"},
{n:"United Kingdom",c:"gb"},
{n:"United States",c:"us"},
{n:"Canada",c:"ca"},
{n:"Brazil",c:"br"},
{n:"Argentina",c:"ar"},
{n:"Mexico",c:"mx"},
{n:"Japan",c:"jp"},
{n:"China",c:"cn"},
{n:"India",c:"in"},
{n:"Australia",c:"au"},
{n:"South Africa",c:"za"},
{n:"Russia",c:"ru"},
{n:"Sweden",c:"se"},
{n:"Norway",c:"no"},
{n:"Denmark",c:"dk"},
{n:"Finland",c:"fi"},
{n:"Netherlands",c:"nl"},
{n:"Belgium",c:"be"},
{n:"Portugal",c:"pt"},
{n:"Greece",c:"gr"},
{n:"Turkey",c:"tr"},
{n:"Saudi Arabia",c:"sa"},
{n:"South Korea",c:"kr"},
{n:"Indonesia",c:"id"},
{n:"Thailand",c:"th"},
{n:"Philippines",c:"ph"}
];

function flag(code){
return `https://flagcdn.com/w640/${code}.png`;
}

let current;

// SPIN
function spin(){

let spins=0;
let targetInput=document.getElementById("target").value.toLowerCase();

let target=countries.find(x=>x.n.toLowerCase()===targetInput);

let final=target || countries[Math.floor(Math.random()*countries.length)];

let interval=setInterval(()=>{

let r=countries[Math.floor(Math.random()*countries.length)];
document.getElementById("flag").src=flag(r.c);

spins++;

if(spins>50){
clearInterval(interval);

current=final;
document.getElementById("flag").src=flag(final.c);

setAnswers(final);

}

},70);

}

// ANSWERS
function setAnswers(correct){

let options=[correct];

while(options.length<3){
let r=countries[Math.floor(Math.random()*countries.length)];
if(!options.includes(r)) options.push(r);
}

options.sort(()=>Math.random()-0.5);

a.innerText="A) "+options[0].n;
b.innerText="B) "+options[1].n;
c.innerText="C) "+options[2].n;

window.correct=options.indexOf(correct);
}

// REVEAL
function reveal(){
document.querySelectorAll(".answer")[correct].classList.add("correct");
}

// TOGGLES
function toggleAnswers(){
answers.style.display = answers.style.display === "none" ? "block" : "none";
}

function toggleCounter(){
counter.style.display = counter.style.display === "none" ? "block" : "none";
}

function toggleTimer(){
timer.style.display = timer.style.display === "none" ? "flex" : "none";
}

function toggleQuestion(){
qbox.style.display = qbox.style.display === "none" ? "block" : "none";
}

// LAYOUT
function setLayout(type){
if(type==="16:9"){
document.querySelector(".frame").style.width="900px";
document.querySelector(".frame").style.height="500px";
}else{
document.querySelector(".frame").style.width="405px";
document.querySelector(".frame").style.height="720px";
}
}

// START
spin();

</script>

</body>
</html>
