<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flag Quiz Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#00ff00;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* FRAME */

.frame{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:15px;
padding:20px;
}

/* LAYOUTS */

.frame.vertical{
width:405px;
height:720px;
}

.frame.horizontal{
width:900px;
height:500px;
}

/* COUNTER */

.counter{
font-size:60px;
font-weight:bold;
color:#2e7d32;
-webkit-text-stroke:3px white;
}

/* TIMER */

.timer{
position:absolute;
top:20px;
right:20px;
width:70px;
height:70px;
border-radius:50%;
border:5px solid white;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:24px;
}

/* QUESTION */

.question-box{
background:white;
padding:12px 25px;
border-radius:30px;
}

.question{
font-size:20px;
font-weight:bold;
}

/* FLAG */

.flagbox{
width:320px;
height:190px;
background:white;
border-radius:15px;
display:flex;
justify-content:center;
align-items:center;
}

.flagbox img{
width:100%;
height:100%;
object-fit:contain;
}

/* ANSWERS */

.answers{
display:flex;
flex-direction:column;
gap:8px;
align-items:center;
}

.answer{
font-size:28px;
font-weight:bold;
color:#ffd54f;
text-shadow:2px 2px black;
}

.correct{
color:#2ecc71;
}

/* CONTROLS */

.controls{
position:fixed;
left:10px;
top:10px;
background:#111;
padding:15px;
border-radius:10px;
color:white;
width:250px;
}

.controls input, .controls select{
width:100%;
margin-bottom:8px;
}

.controls button{
width:100%;
margin-bottom:5px;
padding:8px;
}

</style>
</head>

<body>

<div class="controls">

<b>Controls</b>

<input id="target" placeholder="Type country (e.g. Ireland)">

<button onclick="spin()">Spin</button>
<button onclick="reveal()">Reveal</button>

<button onclick="toggleAnswers()">Toggle Answers</button>
<button onclick="toggleCounter()">Toggle Counter</button>
<button onclick="toggleTimer()">Toggle Timer</button>
<button onclick="toggleQuestion()">Toggle Question</button>

<select onchange="setLayout(this.value)">
<option value="vertical">9:16</option>
<option value="horizontal">16:9</option>
</select>

</div>

<div class="frame vertical" id="frame">

<div class="counter" id="counter">1 / 30</div>

<div class="timer" id="timer">5</div>

<div class="question-box" id="qbox">
<div class="question">WHICH COUNTRY FLAG IS THAT?</div>
</div>

<div class="flagbox">
<img id="flag">
</div>

<div class="answers" id="answers">
<div class="answer" id="a"></div>
<div class="answer" id="b"></div>
<div class="answer" id="c"></div>
</div>

</div>

<script>

// FULL COUNTRY DATA (name + code)
const countries = [
{name:"Ireland",code:"ie"},
{name:"France",code:"fr"},
{name:"Germany",code:"de"},
{name:"Spain",code:"es"},
{name:"Italy",code:"it"},
{name:"United Kingdom",code:"gb"},
{name:"United States",code:"us"},
{name:"Canada",code:"ca"},
{name:"Brazil",code:"br"},
{name:"Argentina",code:"ar"},
{name:"Mexico",code:"mx"},
{name:"Japan",code:"jp"},
{name:"China",code:"cn"},
{name:"India",code:"in"},
{name:"Australia",code:"au"},
{name:"South Africa",code:"za"},
{name:"Russia",code:"ru"},
{name:"Sweden",code:"se"},
{name:"Norway",code:"no"},
{name:"Denmark",code:"dk"},
{name:"Finland",code:"fi"},
{name:"Netherlands",code:"nl"},
{name:"Belgium",code:"be"},
{name:"Portugal",code:"pt"},
{name:"Greece",code:"gr"},
{name:"Turkey",code:"tr"},
{name:"Saudi Arabia",code:"sa"},
{name:"South Korea",code:"kr"},
{name:"Indonesia",code:"id"},
{name:"Thailand",code:"th"},
{name:"Philippines",code:"ph"},
{name:"Iran",code:"ir"},
{name:"Pakistan",code:"pk"},
{name:"Egypt",code:"eg"},
{name:"Nigeria",code:"ng"},
{name:"Kenya",code:"ke"},
{name:"Chile",code:"cl"},
{name:"Colombia",code:"co"},
{name:"Peru",code:"pe"},
{name:"Poland",code:"pl"},
{name:"Ukraine",code:"ua"},
{name:"Romania",code:"ro"},
{name:"Czech Republic",code:"cz"},
{name:"Hungary",code:"hu"},
{name:"Austria",code:"at"},
{name:"Switzerland",code:"ch"}
];

// FLAG URL
function flag(code){
return `https://flagcdn.com/w640/${code}.png`;
}

let current;

// MATCH COUNTRY NAME PROPERLY
function findCountry(name){
name = name.toLowerCase().trim();
return countries.find(c => c.name.toLowerCase() === name);
}

// SPIN (FIXED)
function spin(){

let spins = 0;
let totalSpins = 60;

let input = document.getElementById("target").value;
let target = findCountry(input);

let final = target || countries[Math.floor(Math.random()*countries.length)];

let interval = setInterval(()=>{

let r = countries[Math.floor(Math.random()*countries.length)];
document.getElementById("flag").src = flag(r.code);

spins++;

if(spins >= totalSpins){

clearInterval(interval);

current = final;
document.getElementById("flag").src = flag(final.code);

setAnswers(final);

}

},70);

}

// ANSWERS (FULL NAMES)
function setAnswers(correct){

let options=[correct];

while(options.length<3){
let r=countries[Math.floor(Math.random()*countries.length)];
if(!options.includes(r)) options.push(r);
}

options.sort(()=>Math.random()-0.5);

a.innerText="A) "+options[0].name;
b.innerText="B) "+options[1].name;
c.innerText="C) "+options[2].name;

window.correct=options.indexOf(correct);
}

// REVEAL
function reveal(){
document.querySelectorAll(".answer")[correct].classList.add("correct");
}

// TOGGLES
function toggleAnswers(){answers.style.display = answers.style.display==="none"?"flex":"none";}
function toggleCounter(){counter.style.display = counter.style.display==="none"?"block":"none";}
function toggleTimer(){timer.style.display = timer.style.display==="none"?"flex":"none";}
function toggleQuestion(){qbox.style.display = qbox.style.display==="none"?"block":"none";}

// LAYOUT FIX
function setLayout(type){
let frame = document.getElementById("frame");
frame.className = "frame " + type;
}

// START
spin();

</script>

</body>
</html>
