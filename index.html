<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flag Quiz Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#00ff00;
  --frame-w:405px;
  --frame-h:720px;
  --flag-w:320px;
  --flag-h:190px;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:var(--bg);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.wrap{
  display:flex;
  gap:18px;
  align-items:flex-start;
}

/* CONTROLS */
.controls{
  position:fixed;
  left:10px;
  top:10px;
  background:#111;
  padding:15px;
  border-radius:14px;
  color:#fff;
  width:250px;
  z-index:10;
}

.controls input,
.controls select,
.controls button{
  width:100%;
  margin-bottom:8px;
  padding:8px;
  border-radius:8px;
  border:none;
}

.controls button{
  cursor:pointer;
  font-weight:bold;
}

.controls.hidden{
  display:none;
}

/* FRAME */
.frame{
  width:var(--frame-w);
  height:var(--frame-h);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
  padding:20px;
  position:relative;
}

.counter{
  font-size:60px;
  font-weight:bold;
  color:#2e7d32;
  -webkit-text-stroke:3px white;
  line-height:1;
}

.timer{
  position:absolute;
  top:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  border:5px solid white;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:24px;
  font-weight:bold;
  background:rgba(0,0,0,.15);
}

.question-box{
  background:white;
  padding:12px 25px;
  border-radius:30px;
  text-align:center;
}

.question{
  font-size:20px;
  font-weight:bold;
  text-transform:uppercase;
}

.flagbox{
  width:var(--flag-w);
  height:var(--flag-h);
  background:white;
  border-radius:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.flagbox img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}

.answers{
  display:flex;
  flex-direction:column;
  gap:8px;
  align-items:center;
  width:100%;
}

.answer{
  font-size:28px;
  font-weight:bold;
  color:#ffd54f;
  text-shadow:2px 2px #000;
}

.answer.correct{
  color:#2ecc71;
}

.hidden{
  display:none !important;
}
</style>
</head>

<body>

<div class="controls" id="controls">
  <b>Controls</b>
  <input id="target" placeholder="Type country (e.g. Ireland, usa, dubai)">
  <button onclick="spin()">Spin</button>
  <button onclick="reveal()">Reveal</button>
  <button onclick="toggleAnswers()">Toggle Answers</button>
  <button onclick="toggleCounter()">Toggle Counter</button>
  <button onclick="toggleTimer()">Toggle Timer</button>
  <button onclick="toggleQuestion()">Toggle Question</button>
  <button onclick="toggleControls()">Hide UI</button>

  <select onchange="setLayout(this.value)">
    <option value="vertical">9:16</option>
    <option value="horizontal">16:9</option>
  </select>
</div>

<div class="frame" id="frame">
  <div class="counter" id="counter">1 / 30</div>
  <div class="timer" id="timer">5</div>

  <div class="question-box" id="qbox">
    <div class="question">WHICH COUNTRY FLAG IS THAT?</div>
  </div>

  <div class="flagbox">
    <img id="flag" alt="flag">
  </div>

  <div class="answers" id="answers">
    <div class="answer" id="a"></div>
    <div class="answer" id="b"></div>
    <div class="answer" id="c"></div>
  </div>
</div>

const aliases = {
  usa: "United States",
  america: "United States",
  us: "United States",
  uk: "United Kingdom",
  britain: "United Kingdom",
  england: "United Kingdom",
  uae: "United Arab Emirates",
  dubai: "United Arab Emirates",
  southkorea: "South Korea",
  northkorea: "North Korea",
  czechia: "Czech Republic"
};

const flagEl = document.getElementById("flag");
const answersEl = document.getElementById("answers");
const counterEl = document.getElementById("counter");
const timerEl = document.getElementById("timer");
const qboxEl = document.getElementById("qbox");
const frameEl = document.getElementById("frame");

let current = null;
let currentCorrectIndex = -1;
let spinInterval = null;
let timerInterval = null;

function flagUrl(code){
  return `https://flagcdn.com/w640/${code}.png`;
}

function normalize(s){
  return s.toLowerCase().trim().replace(/[^\w\s-]/g,"");
}

function resolveTargetCountry(input){
  const raw = normalize(input);
  if(!raw) return null;

  const aliasHit = aliases[raw];
  if(aliasHit){
    return countries.find(c => c.name === aliasHit) || null;
  }

  const exact = countries.find(c => normalize(c.name) === raw);
  if(exact) return exact;

  const partial = countries.find(c => normalize(c.name).includes(raw));
  if(partial) return partial;

  return null;
}

function randomCountry(){
  return countries[Math.floor(Math.random() * countries.length)];
}

function clearReveal(){
  document.querySelectorAll(".answer").forEach(el => el.classList.remove("correct"));
  currentCorrectIndex = -1;
}

function setAnswers(correct){
  const options = [correct];

  while(options.length < 3){
    const r = randomCountry();
    if(!options.some(o => o.code === r.code)){
      options.push(r);
    }
  }

  options.sort(() => Math.random() - 0.5);

  document.getElementById("a").textContent = `A) ${options[0].name}`;
  document.getElementById("b").textContent = `B) ${options[1].name}`;
  document.getElementById("c").textContent = `C) ${options[2].name}`;

  currentCorrectIndex = options.findIndex(o => o.code === correct.code);
}

function reveal(){
  clearReveal();
  if(currentCorrectIndex >= 0){
    document.querySelectorAll(".answer")[currentCorrectIndex].classList.add("correct");
  }
}

function clearSpinTimer(){
  if(spinInterval){
    clearInterval(spinInterval);
    spinInterval = null;
  }
  if(timerInterval){
    clearInterval(timerInterval);
    timerInterval = null;
  }
}

function startTimer(seconds = 5){
  let time = seconds;
  timerEl.textContent = time;

  if(timerEl.classList.contains("hidden")) return;

  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    time--;
    timerEl.textContent = time;
    if(time <= 0){
      clearInterval(timerInterval);
      timerInterval = null;
    }
  }, 1000);
}

function spin(){
  clearSpinTimer();
  clearReveal();

  const input = document.getElementById("target").value;
  const target = resolveTargetCountry(input);
  const finalCountry = target || randomCountry();

  const duration = 4000;
  const tickMs = 30;
  const start = Date.now();

  spinInterval = setInterval(() => {
    flagEl.src = flagUrl(randomCountry().code);

    if(Date.now() - start >= duration){
      clearInterval(spinInterval);
      spinInterval = null;

      current = finalCountry;
      flagEl.src = flagUrl(finalCountry.code);
      setAnswers(finalCountry);
      startTimer(5);
    }
  }, tickMs);
}

function toggleAnswers(){
  answersEl.classList.toggle("hidden");
}

function toggleCounter(){
  counterEl.classList.toggle("hidden");
}

function toggleTimer(){
  timerEl.classList.toggle("hidden");
}

function toggleQuestion(){
  qboxEl.classList.toggle("hidden");
}

function toggleControls(){
  document.getElementById("controls").classList.toggle("hidden");
}

function setLayout(type){
  if(type === "horizontal"){
    document.documentElement.style.setProperty("--frame-w", "900px");
    document.documentElement.style.setProperty("--frame-h", "500px");
    document.documentElement.style.setProperty("--flag-w", "360px");
    document.documentElement.style.setProperty("--flag-h", "210px");
    frameEl.style.width = "900px";
    frameEl.style.height = "500px";
  } else {
    frameEl.style.width = "405px";
    frameEl.style.height = "720px";
  }
}

/* init */
frameEl.style.width = "405px";
frameEl.style.height = "720px";
spin();
