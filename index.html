<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flag Quiz Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#00ff00;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* FRAME */

.frame{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
gap:15px;
}

/* DEFAULT 9:16 */

.frame.vertical{
width:405px;
height:720px;
}

/* 16:9 */

.frame.horizontal{
width:900px;
height:500px;
}

/* COUNTER */

.counter{
font-size:60px;
font-weight:bold;
color:#2e7d32;
-webkit-text-stroke:3px white;
}

/* TIMER */

.timer{
position:absolute;
top:20px;
right:20px;
width:70px;
height:70px;
border-radius:50%;
border:5px solid white;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:24px;
}

/* QUESTION */

.question-box{
background:white;
padding:12px 25px;
border-radius:30px;
}

.question{
font-size:20px;
font-weight:bold;
}

/* FLAG */

.flagbox{
width:320px;
height:190px;
background:white;
border-radius:15px;
display:flex;
justify-content:center;
align-items:center;
}

.flagbox img{
width:100%;
height:100%;
object-fit:contain;
}

/* ANSWERS */

.answers{
display:flex;
flex-direction:column;
gap:8px;
width:100%;
align-items:center;
}

.answer{
font-size:28px;
font-weight:bold;
color:#ffd54f;
text-shadow:2px 2px black;
}

.correct{
color:#2ecc71;
}

/* CONTROLS */

.controls{
position:fixed;
left:10px;
top:10px;
background:#111;
padding:15px;
border-radius:10px;
color:white;
width:250px;
}

.controls input, .controls select{
width:100%;
margin-bottom:8px;
}

.controls button{
width:100%;
margin-bottom:5px;
padding:8px;
}

</style>
</head>

<body>

<div class="controls">

<b>Controls</b>

<input id="target" placeholder="Type country (e.g. France)">

<button onclick="spin()">Spin</button>
<button onclick="reveal()">Reveal</button>

<button onclick="toggleAnswers()">Toggle Answers</button>
<button onclick="toggleCounter()">Toggle Counter</button>
<button onclick="toggleTimer()">Toggle Timer</button>
<button onclick="toggleQuestion()">Toggle Question</button>

<select onchange="setLayout(this.value)">
<option value="vertical">9:16</option>
<option value="horizontal">16:9</option>
</select>

</div>

<div class="frame vertical" id="frame">

<div class="counter" id="counter">1 / 30</div>

<div class="timer" id="timer">5</div>

<div class="question-box" id="qbox">
<div class="question" id="question">WHICH COUNTRY FLAG IS THAT?</div>
</div>

<div class="flagbox">
<img id="flag">
</div>

<div class="answers" id="answers">
<div class="answer" id="a"></div>
<div class="answer" id="b"></div>
<div class="answer" id="c"></div>
</div>

</div>

<script>

// FULL COUNTRY LIST (~195)
const countries = [
"af","al","dz","ad","ao","ar","am","au","at","az",
"bs","bh","bd","bb","by","be","bz","bj","bt","bo",
"ba","bw","br","bn","bg","bf","bi","kh","cm","ca",
"cv","cf","td","cl","cn","co","km","cg","cr","hr",
"cu","cy","cz","dk","dj","do","ec","eg","sv","gq",
"er","ee","sz","et","fj","fi","fr","ga","gm","ge",
"de","gh","gr","gd","gt","gn","gw","gy","ht","hn",
"hu","is","in","id","ir","iq","ie","il","it","jm",
"jp","jo","kz","ke","ki","kp","kr","kw","kg","la",
"lv","lb","ls","lr","ly","lt","lu","mg","mw","my",
"mv","ml","mt","mh","mr","mu","mx","fm","md","mc",
"mn","me","ma","mz","mm","na","nr","np","nl","nz",
"ni","ne","ng","mk","no","om","pk","pw","pa","pg",
"py","pe","ph","pl","pt","qa","ro","ru","rw","kn",
"lc","vc","ws","sm","st","sa","sn","rs","sc","sl",
"sg","sk","si","sb","so","za","ss","es","lk","sd",
"sr","se","ch","sy","tw","tj","tz","th","tl","tg",
"to","tt","tn","tr","tm","tv","ug","ua","ae","gb",
"us","uy","uz","vu","va","ve","vn","ye","zm","zw"
];

// flag function
function flag(code){
return `https://flagcdn.com/w640/${code}.png`;
}

let current;

// SPIN (FAST 4s)
function spin(){

let spins = 0;
let totalSpins = 60; // ~4 seconds fast

let input = document.getElementById("target").value.toLowerCase();

// find matching code
let targetCode = countries.find(c => c === input || input.includes(c));

let final = targetCode || countries[Math.floor(Math.random()*countries.length)];

let interval = setInterval(()=>{

let r = countries[Math.floor(Math.random()*countries.length)];
document.getElementById("flag").src = flag(r);

spins++;

if(spins >= totalSpins){

clearInterval(interval);

current = final;
document.getElementById("flag").src = flag(final);

setAnswers(final);

}

},70);

}

// ANSWERS
function setAnswers(correct){

let options=[correct];

while(options.length<3){
let r=countries[Math.floor(Math.random()*countries.length)];
if(!options.includes(r)) options.push(r);
}

options.sort(()=>Math.random()-0.5);

a.innerText="A) "+options[0].toUpperCase();
b.innerText="B) "+options[1].toUpperCase();
c.innerText="C) "+options[2].toUpperCase();

window.correct=options.indexOf(correct);
}

// REVEAL
function reveal(){
document.querySelectorAll(".answer")[correct].classList.add("correct");
}

// TOGGLES
function toggleAnswers(){answers.style.display = answers.style.display==="none"?"flex":"none";}
function toggleCounter(){counter.style.display = counter.style.display==="none"?"block":"none";}
function toggleTimer(){timer.style.display = timer.style.display==="none"?"flex":"none";}
function toggleQuestion(){qbox.style.display = qbox.style.display==="none"?"block":"none";}

// LAYOUT FIX
function setLayout(type){
let frame = document.getElementById("frame");
frame.className = "frame " + type;
}

// start
spin();

</script>

</body>
</html>
