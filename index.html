<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flag Quiz Generator 1.1</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#00ff00;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* VIDEO FRAME */

.frame{
width:405px;
height:720px;
background:#00ff00;
display:flex;
flex-direction:column;
align-items:center;
padding:15px;
box-sizing:border-box;
position:relative;
}

/* COUNTER */

.counter{
font-size:60px;
font-weight:bold;
color:#2ecc71;
-webkit-text-stroke:3px white;
margin-bottom:10px;
}

/* QUESTION */

.question{
background:white;
padding:12px 25px;
border-radius:30px;
font-size:20px;
font-weight:bold;
color:#2e7d32;
margin-bottom:15px;
text-align:center;
}

/* FLAG */

.flagbox{
width:320px;
height:190px;
background:white;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 5px 10px rgba(0,0,0,0.3);
margin-bottom:15px;
}

.flagbox img{
width:100%;
height:100%;
object-fit:contain;
}

/* ANSWERS */

.answers{
width:100%;
display:flex;
flex-direction:column;
gap:10px;
}

.answer{
font-size:28px;
font-weight:bold;
color:#ffd54f;
text-shadow:2px 2px 0 #000;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.correct{
color:#2ecc71;
}

/* TIMER */

.timer{
position:absolute;
top:15px;
right:15px;
width:60px;
height:60px;
border-radius:50%;
border:5px solid white;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
font-size:20px;
background:rgba(0,0,0,0.4);
color:white;
}

.timer.hidden{
display:none;
}

/* CONTROLS */

.controls{
position:fixed;
left:10px;
top:10px;
background:#111;
padding:15px;
border-radius:10px;
color:white;
font-size:14px;
width:220px;
}

.controls input{
width:100%;
margin-bottom:5px;
}

.controls button{
margin-top:5px;
width:100%;
}

</style>
</head>

<body>

<div class="frame">

<div class="timer" id="timer">5</div>

<div class="counter" id="counter">1/30</div>

<div contenteditable="true" class="question" id="question">
WHICH COUNTRY FLAG IS THAT?
</div>

<div class="flagbox">
<img id="flag">
</div>

<div class="answers">
<div class="answer" id="a"></div>
<div class="answer" id="b"></div>
<div class="answer" id="c"></div>
</div>

</div>

<div class="controls">

Counter Text
<input id="counterInput" value="1/30">

Counter Color
<input id="counterColor" value="#2ecc71">

Counter Outline
<input id="counterOutline" value="#ffffff">

Question Box Color
<input id="questionBg" value="#ffffff">

Question Text Color
<input id="questionColor" value="#2e7d32">

Timer Seconds
<input id="timerSeconds" value="5">

<label><input type="checkbox" id="hideTimer"> Hide timer</label>

<button onclick="spin()">Spin</button>
<button onclick="reveal()">Reveal</button>
<button onclick="startAuto()">Auto 30</button>

</div>

<script>

let countries=[]
let current
let used=[]
let round=1
let auto=false
let timerInt

async function load(){

let res=await fetch("https://restcountries.com/v3.1/all")
countries=await res.json()

spin()

}

/* PREVENT REPEAT FLAGS */

function randomCountry(){

if(used.length>=countries.length){
used=[]
}

let c

while(true){

c=countries[Math.floor(Math.random()*countries.length)]

if(!used.includes(c.cca2)){
used.push(c.cca2)
break
}

}

return c

}

/* SPIN EFFECT */

function spin(){

let spins=0

let interval=setInterval(()=>{

let c=randomCountry()

document.getElementById("flag").src=c.flags.png

spins++

if(spins>25){

clearInterval(interval)
current=c
setAnswers(c)

}

},80)

}

/* ANSWERS */

function setAnswers(correct){

let options=[correct]

while(options.length<3){

let r=countries[Math.floor(Math.random()*countries.length)]

if(!options.includes(r)) options.push(r)

}

options.sort(()=>Math.random()-0.5)

document.getElementById("a").innerText="A) "+options[0].name.common
document.getElementById("b").innerText="B) "+options[1].name.common
document.getElementById("c").innerText="C) "+options[2].name.common

window.correct=options.indexOf(correct)

}

/* REVEAL */

function reveal(){

document.querySelectorAll(".answer")[correct].classList.add("correct")

}

/* SETTINGS */

setInterval(()=>{

counter.innerText=counterInput.value
counter.style.color=counterColor.value
counter.style.webkitTextStroke=`3px ${counterOutline.value}`

question.style.background=questionBg.value
question.style.color=questionColor.value

},200)

/* TIMER */

function startTimer(){

let seconds=parseInt(timerSeconds.value)

if(hideTimer.checked){
timer.classList.add("hidden")
return
}else{
timer.classList.remove("hidden")
}

timer.innerText=seconds

clearInterval(timerInt)

timerInt=setInterval(()=>{

seconds--
timer.innerText=seconds

if(seconds<=0){
clearInterval(timerInt)
nextRound()
}

},1000)

}

/* AUTO MODE */

function startAuto(){

auto=true
round=1
nextRound()

}

function nextRound(){

counter.innerText=`${round}/30`

spin()

startTimer()

round++

if(round>30){
auto=false
}

}

load()

</script>

</body>
</html>
