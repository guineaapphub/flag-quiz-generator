<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flag Quiz Generator 1.1</title>

<style>

:root{
--frame-width:405px;
--frame-height:720px;
--flag-width:320px;
--counter-color:#2ecc71;
--counter-outline:#ffffff;
--question-bg:#ffffff;
--question-color:#2e7d32;
--bg:#00ff00;
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
display:flex;
gap:20px;
}

/* CONTROL PANEL */

.controls{
width:330px;
background:#0f172a;
color:white;
padding:20px;
border-radius:14px;
font-size:14px;
}

.controls input,
.controls select{
width:100%;
padding:8px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

.controls button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

/* VIDEO FRAME */

.frame{
width:var(--frame-width);
height:var(--frame-height);
background:var(--bg);
border-radius:20px;
position:relative;
overflow:hidden;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
}

/* COUNTER */

.counter{
font-size:60px;
font-weight:900;
color:var(--counter-color);
-webkit-text-stroke:4px var(--counter-outline);
}

/* QUESTION */

.question{
background:var(--question-bg);
color:var(--question-color);
font-weight:900;
padding:14px 25px;
border-radius:40px;
margin:10px 0;
text-transform:uppercase;
text-align:center;
max-width:90%;
}

/* FLAG */

.flagbox{
width:var(--flag-width);
height:180px;
background:white;
border-radius:10px;
padding:10px;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 8px 20px rgba(0,0,0,.3);
}

.flagbox img{
width:100%;
height:100%;
object-fit:contain;
}

/* ANSWERS */

.answers{
margin-top:10px;
font-size:30px;
font-weight:900;
color:#ffd54f;
-webkit-text-stroke:2px black;
text-align:left;
white-space:nowrap;
overflow:hidden;
}

.correct{
color:#2ecc71;
}

/* TIMER */

.timer{
position:absolute;
top:15px;
right:15px;
width:60px;
height:60px;
border-radius:50%;
border:6px solid white;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
font-size:18px;
background:rgba(0,0,0,.3);
}

.timer.hidden{display:none}

</style>
</head>

<body>

<div class="container">

<!-- CONTROL PANEL -->

<div class="controls">
<h3>Flag Quiz Generator 1.1</h3>

<label>Counter text</label>
<input id="counterInput" value="1/30">

<label>Counter color</label>
<input id="counterColor" value="#2ecc71">

<label>Counter outline</label>
<input id="counterOutline" value="#ffffff">

<label>Question text</label>
<input id="questionInput" value="WHICH COUNTRY FLAG IS THAT?">

<label>Question box color</label>
<input id="questionBg" value="#ffffff">

<label>Question text color</label>
<input id="questionColor" value="#2e7d32">

<label>Background color</label>
<input id="bgColor" value="#00ff00">

<label>Mode</label>
<select id="mode">
<option value="manual">Manual Spin</option>
<option value="auto">Auto 30 Questions</option>
</select>

<label>Timer seconds</label>
<input id="timerSeconds" value="5">

<label><input type="checkbox" id="hideTimer"> Hide timer</label>

<button onclick="spin()">Spin</button>
<button onclick="reveal()">Reveal</button>
<button onclick="startAuto()">Start Auto</button>

</div>

<!-- QUIZ FRAME -->

<div class="frame" id="frame">

<div class="timer" id="timer">5</div>

<div class="counter" id="counter">1/30</div>

<div class="question" id="question">WHICH COUNTRY FLAG IS THAT?</div>

<div class="flagbox">
<img id="flag">
</div>

<div class="answers" id="answers"></div>

</div>

</div>

<script>

let countries=[]
let current
let usedFlags=new Set()
let round=1
let autoRunning=false

/* LOAD COUNTRIES */

async function load(){

let res=await fetch("https://restcountries.com/v3.1/all")

countries=await res.json()

spin()

}

/* RANDOM COUNTRY WITHOUT REPEAT */

function randomCountry(){

if(usedFlags.size>=countries.length){
usedFlags.clear()
}

let c

while(true){

c=countries[Math.floor(Math.random()*countries.length)]

if(!usedFlags.has(c.cca2)){
usedFlags.add(c.cca2)
break
}

}

return c

}

/* SPIN EFFECT */

function spin(){

let flickers=0

let interval=setInterval(()=>{

let c=randomCountry()

flag.src=c.flags.png

flickers++

if(flickers>20){

clearInterval(interval)

current=c

setAnswers(c)

}

},70)

}

/* CREATE ANSWERS */

function setAnswers(correct){

let options=[correct]

while(options.length<3){

let r=randomCountry()

if(!options.includes(r)) options.push(r)

}

options.sort(()=>Math.random()-0.5)

let html=""

options.forEach((o,i)=>{

let letter=["A","B","C"][i]

html+=`${letter}) ${o.name.common}<br>`

})

answers.innerHTML=html

window.correct=options.indexOf(correct)

}

/* REVEAL ANSWER */

function reveal(){

let lines=answers.innerHTML.split("<br>")

lines[correct]=`<span class='correct'>${lines[correct]}</span>`

answers.innerHTML=lines.join("<br>")

}

/* SETTINGS UPDATE */

function updateSettings(){

counter.innerText=counterInput.value

document.documentElement.style.setProperty('--counter-color',counterColor.value)

document.documentElement.style.setProperty('--counter-outline',counterOutline.value)

question.innerText=questionInput.value

question.style.background=questionBg.value

question.style.color=questionColor.value

frame.style.background=bgColor.value

}

setInterval(updateSettings,200)

/* TIMER */

let timerInterval

function startTimer(seconds,callback){

if(hideTimer.checked){

timer.classList.add("hidden")

}else{

timer.classList.remove("hidden")

}

let s=seconds

clearInterval(timerInterval)


timer.innerText=s


timerInterval=setInterval(()=>{

s--

timer.innerText=s

if(s<=0){

clearInterval(timerInterval)

callback()

}

},1000)

}

/* AUTO MODE */

function startAuto(){

if(autoRunning) return

autoRunning=true

round=1

nextRound()

}

function nextRound(){

counter.innerText=`${round}/30`

spin()

startTimer(parseInt(timerSeconds.value),()=>{

round++

if(round<=30){

nextRound()

}else{

autoRunning=false

}

})

}

load()

</script>

</body>
</html>
